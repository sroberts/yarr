name: qa-tuning

# Weekly self-tuning loop. Recomputes per-category acceptance rates
# from the past 30 days of merged-vs-closed PRs and writes them back
# to auto-qa-tuning.json via a PR.
#
# Hits two L4 signals:
#   * self-modifying-config: opens a PR with peter-evans/create-pull-request
#   * threshold-block:       gates further action on a numeric threshold
#                            read from the regenerated metrics

on:
  schedule:
    - cron: '13 4 * * 1'  # Mondays 04:13 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  recompute:
    runs-on: ubuntu-latest
    outputs:
      data: ${{ steps.metrics.outputs.data }}
    steps:
      - uses: actions/checkout@v4

      - name: Recompute acceptance metrics
        id: metrics
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'auto-qa-tuning.json';
            const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));

            const since = new Date(Date.now() - cfg.policy.lookback_days*86400e3);
            const owner = context.repo.owner;
            const repo  = context.repo.repo;

            const { data: prs } = await github.rest.pulls.list({
              owner, repo, state: 'closed', per_page: 100,
              sort: 'updated', direction: 'desc',
            });

            const recent = prs.filter(p => new Date(p.updated_at) >= since);

            const categorize = (pr) => {
              const title = (pr.title || '').toLowerCase();
              if (/parser|rss|atom|opml/.test(title)) return 'feed-parser';
              if (/storage|sqlite|migration|db\b/.test(title)) return 'storage';
              if (/server|handler|route|http/.test(title)) return 'server-handlers';
              if (/ui|css|js|swipe|pwa|asset/.test(title)) return 'ui-assets';
              if (/ci|build|workflow|docker|action/.test(title)) return 'ci-build';
              if (/doc|readme/.test(title)) return 'docs';
              return null;
            };

            for (const cat of Object.keys(cfg.categories)) {
              cfg.categories[cat].merged = 0;
              cfg.categories[cat].closed_unmerged = 0;
            }

            for (const pr of recent) {
              const cat = categorize(pr);
              if (!cat || !cfg.categories[cat]) continue;
              if (pr.merged_at) cfg.categories[cat].merged += 1;
              else              cfg.categories[cat].closed_unmerged += 1;
            }

            const today = new Date().toISOString().slice(0,10);
            for (const [cat, c] of Object.entries(cfg.categories)) {
              const total = c.merged + c.closed_unmerged;
              c.rate = total >= cfg.policy.min_samples
                ? Math.round((c.merged / total) * 100) / 100
                : null;
              c.last_updated = today;
            }

            fs.writeFileSync(path, JSON.stringify(cfg, null, 2) + '\n');

            const minRate = Math.min(
              ...Object.values(cfg.categories)
                .map(c => c.rate)
                .filter(v => v !== null),
              1.0,
            );

            const summary = {
              min_rate: minRate,
              block_below: cfg.policy.block_below,
              warn_below: cfg.policy.warn_below,
            };
            core.setOutput('data', JSON.stringify(summary));
            core.notice(`min_rate=${minRate}`);

      - name: Open PR with refreshed metrics
        if: ${{ fromJson(steps.metrics.outputs.data).min_rate >= 0.5 }}
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: refresh auto-qa-tuning metrics'
          title: 'chore: refresh auto-qa-tuning metrics'
          body: |
            Automated weekly refresh of `auto-qa-tuning.json`.

            Regenerated from the last 30 days of merged-vs-closed PRs.

            > Generated by `.github/workflows/qa-tuning.yml`.
          branch: bot/qa-tuning-refresh
          delete-branch: true
          labels: automation, qa-tuning

      - name: Block on degraded category (threshold gate)
        if: ${{ fromJson(steps.metrics.outputs.data).min_rate < 0.5 }}
        run: |
          MIN='${{ fromJson(steps.metrics.outputs.data).min_rate }}'
          echo "::error::At least one category acceptance rate ($MIN) dropped below 0.5. Refusing to auto-update guidance until a human reviews."
          exit 1
