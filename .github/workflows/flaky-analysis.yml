name: flaky-analysis

# Weekly flaky-test sweep: re-runs the suite N times and surfaces
# any test that didn't deterministically pass. A flake in an
# autonomous AI loop is far more dangerous than in a human one —
# we'd rather detect intermittents on a schedule than chase ghosts
# in PR-time CI.

on:
  schedule:
    - cron: '37 6 * * 1'  # Mondays 06:37 UTC
  workflow_dispatch:

jobs:
  flaky-detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '^1.23'

      - name: Run suite 5x and log failures
        id: rerun
        continue-on-error: true
        run: |
          set +e
          mkdir -p .flaky
          FAIL=0
          for i in 1 2 3 4 5; do
            echo "::group::run #$i"
            go test -tags "sqlite_foreign_keys sqlite_json" -race -count=1 \
              ./... | tee ".flaky/run-$i.log"
            rc=${PIPESTATUS[0]}
            echo "::endgroup::"
            if [ "$rc" -ne 0 ]; then FAIL=$((FAIL+1)); fi
          done
          echo "failures=$FAIL" >> "$GITHUB_OUTPUT"

      - name: Summarize flakes
        run: |
          {
            echo "## Flaky test sweep"
            echo
            echo "Failures across 5 runs: ${{ steps.rerun.outputs.failures }}"
            echo
            grep -hE '^--- FAIL' .flaky/*.log 2>/dev/null \
              | sort -u \
              | sed 's/^/- /' || echo "_no failures_"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload run logs
        uses: actions/upload-artifact@v4
        with:
          name: flaky-runs
          path: .flaky/
          retention-days: 30
